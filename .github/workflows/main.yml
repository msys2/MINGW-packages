name: main

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:

jobs:
  prepare:
    name: 🖥️ Compute job matrix
    runs-on: ubuntu-24.04
    outputs:
      jobmatrix:        ${{ steps.compute.outputs.jobmatrix }}
      modifiedPackages: ${{ steps.compute.outputs.modifiedPackages }}
    steps:
      - name: ⏬ Checkout repository
        uses: actions/checkout@v6
        with:
#          path: temp
          fetch-depth: 0
          filter: blob:none
          persist-credentials: false

      - name: 🔝 Add upstream as a second remote
        run: |
          UPSTREAM=https://github.com/MSYS2/MINGW-packages
          printf -- "Add remote 'upstream' -> ${UPSTREAM}\n"
          git remote add upstream "${UPSTREAM}"
          printf -- "fetch from upstream ...\n"
          git fetch --quiet upstream
          printf -- "Remotes:\n"
          git remote -v
          printf -- "Branches:\n"
          git branch -rv

      - name: 🔍 Find modified packages and used msystems
        id: compute
        run: .ci/ci-prepare.py

# TODO: An error could be created if package files were modified, but PKGBUILD was not.
      - name: 🪲 Debug
        run: |
          printf -- '${{ steps.compute.outputs.jobmatrix }}\n'

  build:
    needs:
      - prepare
    # Don't run: if pushed to master or if nothing was modified
    if: ${{ ! ((github.event_name == 'push' && github.ref == 'refs/heads/master') || needs.prepare.outputs.modifiedPackages == '') }}
    strategy:
      fail-fast: false
      matrix:
        # Matrix elements: icon, msystem, runner
        include: ${{ fromJson(needs.prepare.outputs.jobmatrix) }}
    name: ${{ matrix.icon }} ${{ matrix.msystem }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Gather Facts
        id: facts
        run: |
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize -Wrap
          Get-CIMInstance -Class Win32_Processor | Select-Object -Property Name
          Get-CIMInstance Win32_PhysicalMemory | Measure-Object -Property Capacity -Sum | Format-Table @{n="TotalPhysicalMemory";e={$_.Sum}}
          $BUILD_DRIVE = Split-Path $env:GITHUB_WORKSPACE -Qualifier
          echo "drive=$BUILD_DRIVE" >> $env:GITHUB_OUTPUT

      - name: Configure Pagefile
        if: ${{ matrix.msystem != 'CLANGARM64' }}
        # https://github.com/al-cheb/configure-pagefile-action/issues/16
        continue-on-error: true
        uses: al-cheb/configure-pagefile-action@v1.4
        with:
          minimum-size: 4GB
          maximum-size: 16GB
          # Needs to be C:, see https://github.com/al-cheb/configure-pagefile-action/issues/18
          disk-root: "C:"

      - uses: actions/checkout@v6
        with:
          path: temp
          fetch-depth: 0
          filter: blob:none
          persist-credentials: false

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: git python base-devel
          update: true
          location: '${{ steps.facts.outputs.drive }}\M'

      - name: Add staging repo
        shell: msys2 {0}
        run: |
          cp /etc/pacman.conf /etc/pacman.conf.bak
          grep -qFx '[staging]' /etc/pacman.conf || sed -i '/^# \[staging\]/,/^$/ s|^# ||g' /etc/pacman.conf

      - name: Update using staging
        run: |
          msys2 -c 'pacman --noconfirm -Suuy'
          msys2 -c 'pacman --noconfirm -Suu'

      - name: Move Checkout
        run: |
          $path = "${{ steps.facts.outputs.drive }}\_"
          If (Test-Path "$path") { rm -r -fo "$path" }
          Move-Item -Path ".\temp" -Destination "$path"

      - name: CI-Build
        shell: msys2 {0}
        id: build
        run: |
          cd "$(cygpath '${{ steps.facts.outputs.drive }}/_')"
          MINGW_ARCH=${{ matrix.msystem }} ./.ci/ci-build.sh

      - name: "Upload binaries"
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.msystem }}-packages
          path: ${{ steps.facts.outputs.drive }}/_/artifacts/*.pkg.tar.*
          if-no-files-found: ignore

  check:
    needs:
      - prepare
      - build
    if: ${{ needs.prepare.outputs.modifiedPackages != '' }}
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: UCRT64-packages
          path: ${{ runner.temp }}/artifacts
      - name: Check whether to Run
        id: check-run
        run: |
          python .ci/ci-check.py --whether-to-run "${{ runner.temp }}/artifacts"
      - uses: msys2/setup-msys2@v2
        if: steps.check-run.outputs.run == 'true'
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-python-pip mingw-w64-ucrt-x86_64-python-pacdb
      - name: Add staging repo
        if: steps.check-run.outputs.run == 'true'
        shell: msys2 {0}
        run: |
          sed -i '1s|^|[staging]\nServer = https://repo.msys2.org/staging/\nSigLevel = Never\n|' /etc/pacman.conf
      - name: Update using staging
        if: steps.check-run.outputs.run == 'true'
        run: |
          msys2 -c 'pacman --noconfirm -Suuy'
          msys2 -c 'pacman --noconfirm -Suu'
      - name: Run Checks
        if: steps.check-run.outputs.run == 'true'
        shell: msys2 {0}
        run: |
          python .ci/ci-check.py "${{ runner.temp }}/artifacts"

  package-grokker:
    needs:
      - prepare
      - build
    if: ${{ needs.prepare.outputs.modifiedPackages != '' }}
    runs-on: ubuntu-latest
    name: package-grokker-${{ matrix.msystem }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - msystem: UCRT64
            repo: ucrt64
          - msystem: CLANG64
            repo: clang64

    steps:
      - uses: actions/download-artifact@v7
        id: artifacts
        continue-on-error: true
        with:
          name: ${{ matrix.msystem }}-packages
          path: artifacts
      - name: Grok packages
        uses: msys2/package-grokker/grok-artifacts@main
        if: steps.artifacts.outcome == 'success'
        with:
          repo: ${{ matrix.repo }}
          path: artifacts
